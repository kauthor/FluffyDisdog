name: 에이전트 문서 자동 업데이트

on:
  push:
    branches:
      - main

jobs:
  update-agent-docs:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 레포지토리 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 필요 패키지 설치
        run: |
          pip install google-genai python-docx openpyxl python-pptx pillow pdfplumber pandas

      - name: Gemini API로 에이전트 문서 생성
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          python << 'EOF'
          import os
          import sys
          import base64
          import subprocess
          import time
          from google import genai
          from google.genai import types
          from pathlib import Path
          from datetime import datetime

          client = genai.Client(api_key=os.environ["GEMINI_API_KEY"])

          commit_message = os.environ.get("COMMIT_MESSAGE", "")
          full_refresh    = "[전체갱신]" in commit_message
          partial_refresh = "[정리]"     in commit_message

          print(f"커밋 메시지: {commit_message}")
          print(f"전체갱신: {full_refresh} / 변경분 정리: {partial_refresh}")

          if not full_refresh and not partial_refresh:
              print("태그 없음 — Gemini API 호출 스킵")
              sys.exit(0)

          if full_refresh:
              print("전체갱신 모드 — Plan/기획서/ 폴더 전체 스캔")
              changed_files = [str(f) for f in Path("Plan/기획서").rglob("*") if f.is_file()]
          else:
              print("변경분 정리 모드 — 변경된 파일만 처리")
              result = subprocess.run(
                  ["git", "diff", "--name-only", "-z", "HEAD~1", "HEAD"],
                  capture_output=True
              )
              raw = result.stdout.decode("utf-8", errors="replace").split("\x00")
              changed_files = [f.strip() for f in raw if f.strip()]

          print(f"대상 파일 수: {len(changed_files)}")

          EXCLUDE_PATHS = [
              "에이전트를 위한 txt",
              "이슈 리포트",
              "마법사.pptx",
              "마법사 카드 제거 전 버전",
          ]
          INCLUDE_PREFIXES = ["Plan/"]
          SUPPORTED_EXT    = [".txt", ".md", ".docx", ".pptx", ".pdf", ".png", ".jpg", ".jpeg"]

          # 출력 폴더 — 레포 내 에이전트용 txt 폴더로 직접 저장
          OUTPUT_BASE = Path("Plan/기획서/에이전트를 위한 txt")
          OUTPUT_CODE = OUTPUT_BASE / "code"
          OUTPUT_DATA = OUTPUT_BASE / "data"
          for d in [OUTPUT_BASE, OUTPUT_CODE, OUTPUT_DATA]:
              d.mkdir(parents=True, exist_ok=True)

          PROMPT_TEMPLATE = """
          당신은 게임 기획 문서를 AI 에이전트가 이해하기 쉬운 형태로 정리하는 전문가입니다.
          아래 게임 기획 문서를 읽고 에이전트용 참고 문서로 정리해주세요.

          정리 규칙:
          1. 확정된 규칙과 미확정 항목을 명확히 구분
          2. 확정 / 검토 중 / 보류 형식으로 상태 표시
          3. 에이전트가 판단 기준으로 사용할 수 있도록 명확하게 작성
          4. 다른 시스템과의 연관 관계 명시
          5. 불필요한 개발 메모나 초안 내용은 제외
          6. 데이터 테이블의 경우 컬럼 의미와 주요 값을 설명

          게임 기본 정보:
          - 장르: 타일 파괴 + 덱빌딩 로그라이크 (엔드리스 지향)
          - 핵심 구조: 8x8 타일 보드를 카드로 파괴하여 목표 점수 달성
          - 현재 플레이어블: 모험가 1종 (추가 캐릭터 확장 예정)

          문서 내용:
          {content}

          위 내용을 에이전트용 참고 문서로 정리해주세요.
          파일명: {filename}
          """

          def read_file(path):
              suffix = path.suffix.lower()
              if suffix in [".txt", ".md"]:
                  return open(path, encoding="utf-8", errors="ignore").read(), "text"
              elif suffix == ".docx":
                  from docx import Document
                  return "\n".join(p.text for p in Document(path).paragraphs), "text"
              elif suffix == ".pptx":
                  from pptx import Presentation
                  lines = []
                  for i, slide in enumerate(Presentation(path).slides):
                      lines.append(f"[슬라이드 {i+1}]")
                      for shape in slide.shapes:
                          if hasattr(shape, "text") and shape.text.strip():
                              lines.append(shape.text.strip())
                  return "\n".join(lines), "text"
              elif suffix == ".pdf":
                  import pdfplumber
                  pages = []
                  with pdfplumber.open(path) as pdf:
                      for page in pdf.pages:
                          t = page.extract_text()
                          if t:
                              pages.append(t)
                  return "\n".join(pages), "text"
              elif suffix in [".png", ".jpg", ".jpeg"]:
                  return base64.b64encode(open(path, "rb").read()).decode(), "image"
              elif suffix == ".csv":
                  import pandas as pd
                  try:
                      df = pd.read_csv(path, encoding="utf-8")
                  except UnicodeDecodeError:
                      df = pd.read_csv(path, encoding="cp949")
                  return df.to_string(), "text"
              elif suffix in [".xlsx", ".xlsm"]:
                  import pandas as pd
                  xl = pd.ExcelFile(path)
                  lines = []
                  for sheet in xl.sheet_names:
                      df = pd.read_excel(path, sheet_name=sheet)
                      lines.append(f"[시트: {sheet}]")
                      lines.append(df.to_string())
                  return "\n".join(lines), "text"
              return None, None

          def call_gemini(content, content_type, filename, retries=3, delay=30):
              for attempt in range(retries):
                  try:
                      if content_type == "image":
                          resp = client.models.generate_content(
                              model="gemini-3-flash-preview",
                              contents=[
                                  types.Part.from_bytes(
                                      data=base64.b64decode(content),
                                      mime_type="image/png"
                                  ),
                                  f"이 이미지는 게임 기획 문서입니다. 파일명: {filename}\n"
                                  f"이미지 내용을 분석하고 에이전트용 참고 문서로 정리해주세요.\n"
                                  f"상태 표시: 확정 / 검토 중 / 보류"
                              ]
                          )
                      else:
                          prompt = PROMPT_TEMPLATE.format(
                              content=content[:50000],
                              filename=filename
                          )
                          resp = client.models.generate_content(
                              model="gemini-3-flash-preview",
                              contents=prompt
                          )
                      return resp.text
                  except Exception as e:
                      err = str(e)
                      if attempt < retries - 1:
                          wait = delay * (2 if "429" in err or "EXHAUSTED" in err else 1)
                          print(f"재시도 {attempt+1}/{retries} ({wait}s): {e}")
                          time.sleep(wait)
                      else:
                          print(f"최종 실패: {e}")
                          return None

          processed = 0
          for fp in changed_files:
              path = Path(fp)
              if not full_refresh and not any(fp.startswith(p) for p in INCLUDE_PREFIXES):
                  continue
              if any(ex in fp for ex in EXCLUDE_PATHS):
                  print(f"제외: {fp}"); continue
              if path.suffix.lower() not in SUPPORTED_EXT:
                  print(f"미지원: {fp}"); continue
              if not path.exists():
                  print(f"없음: {fp}"); continue

              print(f"처리 중: {fp}")
              try:
                  content, ctype = read_file(path)
              except Exception as e:
                  print(f"읽기 실패 {fp}: {e}"); continue
              if not content:
                  continue

              result = call_gemini(content, ctype, path.name)
              if not result:
                  continue

              now = datetime.now().strftime("%Y-%m-%d %H:%M")
              out = OUTPUT_BASE / f"[에이전트]{path.stem}.txt"
              with open(out, "w", encoding="utf-8") as f:
                  f.write(f"[자동 생성] 원본: {path.name}\n")
                  f.write(f"생성일: {now}\n")
                  f.write(f"모드: {'전체갱신' if full_refresh else '변경분 정리'}\n")
                  f.write("=" * 40 + "\n\n")
                  f.write(result)

              print(f"생성 완료: {out}")
              processed += 1

              if processed % 5 == 0:
                  print("API 한도 보호 — 10초 대기")
                  time.sleep(10)

          print(f"\n총 {processed}개 처리 완료")
          EOF

      - name: 에이전트 문서 레포에 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Plan/기획서/에이전트를 위한 txt/"
          git diff --cached --quiet || git commit -m "[자동생성] 에이전트 문서 업데이트"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}